<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pubdir</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="shell">
      <section class="toolbar">
        <button id="backButton" class="button ghost" type="button">← Parent</button>
        <div class="crumb" id="crumb">/</div>
        <label class="search">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Filter this directory" />
        </label>
      </section>

      <section class="workspace">
        <aside class="file-panel">
          <div class="panel-head">
            <span id="itemCount">0 items</span>
            <span class="mono">read only</span>
          </div>
          <div id="fileList" class="file-list"></div>
        </aside>

        <section class="preview-panel">
          <div id="preview" class="preview empty">
            <div class="empty-mark">↯</div>
            <p>Select a file to preview images, video, audio, PDFs, Markdown, code, JSON, CSV, and plain text.</p>
          </div>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
